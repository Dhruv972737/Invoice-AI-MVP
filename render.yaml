services:
  - type: web
    name: invoice-ai-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm install --production
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://invoice-ai-mvp.netlify.app
    disk:
      name: invoice-ai-disk
      mountPath: /tmp
      sizeGB: 1